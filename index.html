<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSSVV Indore | Circulars</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            /* School Colors: Light Blue to Soft Pink Gradient */
            background: linear-gradient(135deg, #a5f3fc, #fbcfe8, #fefce8);
            background-attachment: fixed;
            margin: 0; padding: 20px; color: #1e293b;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Logo Circle */
        .header-section { text-align: center; padding: 40px 0; }
        .logo-circle {
            width: 110px; height: 110px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 4px solid #fff; overflow: hidden;
        }
        .logo-circle img { width: 85%; height: auto; }
        h1 { font-weight: 800; font-size: 2.2rem; color: #0369a1; margin: 0; }

        .mail-card { 
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 24px; padding: 25px; 
            margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.07);
        }
        .mail-title { font-size: 1.4rem; font-weight: 700; color: #0c4a6e; margin: 0 0 5px 0; }
        .mail-date { font-size: 0.85rem; color: #64748b; display: block; margin-bottom: 20px; }

        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 850px) { .grid-layout { grid-template-columns: 1fr; } }

        .text-content { 
            background: #ffffff; padding: 20px; border-radius: 18px; 
            font-size: 0.95rem; line-height: 1.6; max-height: 500px; 
            overflow-y: auto; border: 1px solid #e2e8f0; 
        }
        .pdf-viewer { width: 100%; height: 500px; border-radius: 18px; border: none; background: white; }
        .btn-dl { 
            display: block; text-align: center; margin-top: 15px; 
            background: #0369a1; color: white; padding: 14px; 
            border-radius: 14px; text-decoration: none; font-weight: 700;
        }
        .loader { text-align: center; padding: 100px; font-weight: 600; color: #0369a1; }
    </style>
</head>
<body>
<div class="container">
    <header class="header-section">
        <div class="logo-circle">
            <img src="logo1.jpg" alt="SSSVV Logo">
        </div>
        <h1>School Circulars</h1>
    </header>
    <div id="vault-list"><div class="loader">Fetching latest circulars...</div></div>
</div>

<script>
    const user = "arnavbijlanii"; 
    const repo = "school-vault";

    async function loadVault() {
        const list = document.getElementById('vault-list');
        try {
            const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/data`);
            const files = await response.json();
            // Sort to show newest first
            const dataFiles = files.filter(f => f.name.endsWith('.json')).reverse();
            
            if(dataFiles.length === 0) { list.innerHTML = '<div class="loader">No archived data found.</div>'; return; }
            list.innerHTML = '';

            for (let file of dataFiles) {
                const mailRes = await fetch(file.download_url);
                const mail = await mailRes.json();
                const card = document.createElement('div');
                card.className = 'mail-card';
                
                const pdfSection = mail.pdfPath 
                    ? `<iframe class="pdf-viewer" src="https://docs.google.com/viewer?url=https://raw.githubusercontent.com/${user}/${repo}/main/${mail.pdfPath}&embedded=true"></iframe>
                       <a class="btn-dl" href="https://raw.githubusercontent.com/${user}/${repo}/main/${mail.pdfPath}" target="_blank">Download Official PDF</a>`
                    : `<div class="text-content" style="text-align:center; padding:40px;">No PDF attached to this mail.</div>`;

                card.innerHTML = `
                    <div class="mail-header">
                        <h2 class="mail-title">${mail.subject}</h2>
                        <span class="mail-date">${new Date(mail.date).toLocaleString()}</span>
                    </div>
                    <div class="grid-layout">
                        <div class="text-content">${mail.body}</div>
                        <div class="pdf-area">${pdfSection}</div>
                    </div>`;
                list.appendChild(card);
            }
        } catch (e) { list.innerHTML = '<div class="loader">Error connecting to vault.</div>'; }
    }
    loadVault();
</script>
</body>
</html>
