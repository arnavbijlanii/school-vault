<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSSVV Indore | Circulars</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.2);
            --text: #1e293b;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #87CEEB, #E0F2FE, #FFD1DC);
            background-attachment: fixed;
            color: var(--text); 
            margin: 0; padding: 20px; 
        }
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* School Logo Placeholder */
        .logo-circle {
            width: 100px; height: 100px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            overflow: hidden; border: 4px solid #fff;
        }
        .logo-circle img { width: 80%; height: auto; }

        header { text-align: center; padding: 20px 0 40px; }
        h1 { font-weight: 800; font-size: 2.2rem; margin: 0; color: #0369a1; }

        .mail-card { 
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 24px; padding: 25px; 
            margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .mail-title { font-size: 1.3rem; font-weight: 700; color: #0c4a6e; margin-bottom: 10px; }
        .mail-date { font-size: 0.85rem; color: #64748b; margin-bottom: 20px; display: block; }

        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 850px) { .grid-layout { grid-template-columns: 1fr; } }

        .text-content { 
            background: white; padding: 20px; border-radius: 16px; 
            font-size: 0.95rem; line-height: 1.6; max-height: 500px; 
            overflow-y: auto; border: 1px solid #e2e8f0; 
        }
        .pdf-viewer { width: 100%; height: 500px; border-radius: 16px; border: none; background: white; }
        .btn-dl { 
            display: block; text-align: center; margin-top: 15px; 
            background: #0369a1; color: white; padding: 12px; 
            border-radius: 12px; text-decoration: none; font-weight: 600;
        }
        .empty { text-align: center; padding: 100px; font-weight: 600; color: #0369a1; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo-circle">
            <img src="https://www.sathyasaiindore.com/wp-content/uploads/2021/01/logo-1.png" alt="School Logo">
        </div>
        <h1>School Circulars</h1>
    </header>
    <div id="vault-list"><div class="empty">Loading School Circulars...</div></div>
</div>

<script>
    const username = "arnavbijlanii"; 
    const repo = "school-vault";

    async function fetchVault() {
        const list = document.getElementById('vault-list');
        try {
            const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/data`);
            const files = await res.json();
            const dataFiles = files.filter(f => f.name.endsWith('.json')).reverse();
            
            if(dataFiles.length === 0) { list.innerHTML = '<div class="empty">No data found in GitHub.</div>'; return; }
            list.innerHTML = '';

            for (let file of dataFiles) {
                const dataRes = await fetch(file.download_url);
                const mail = await dataRes.json();
                const card = document.createElement('div');
                card.className = 'mail-card';
                
                const pdfHtml = mail.pdfPath 
                    ? `<iframe class="pdf-viewer" src="https://docs.google.com/viewer?url=https://raw.githubusercontent.com/${username}/${repo}/main/${mail.pdfPath}&embedded=true"></iframe>
                       <a class="btn-dl" href="https://raw.githubusercontent.com/${username}/${repo}/main/${mail.pdfPath}" target="_blank">Download PDF</a>`
                    : `<div class="text-content">No PDF available for this circular.</div>`;

                card.innerHTML = `
                    <div class="mail-header">
                        <div class="mail-title">${mail.subject}</div>
                        <span class="mail-date">${new Date(mail.date).toLocaleString()}</span>
                    </div>
                    <div class="grid-layout">
                        <div class="text-content">${mail.body}</div>
                        <div class="pdf-container">${pdfHtml}</div>
                    </div>`;
                list.appendChild(card);
            }
        } catch (e) { list.innerHTML = '<div class="empty">Connection Error.</div>'; }
    }
    fetchVault();
</script>
</body>
</html>
